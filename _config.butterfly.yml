# --------------------------------------
# Hexo Butterfly 主题配置
# 如有疑问，请参考文档
# 中文文档: https://butterfly.js.org/
# 英文文档: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 Logo 图片
  logo:
  display_title: true
  display_post_title: true
  # 是否固定导航栏
  fixed: true

menu:
  首页: / || fas fa-home
  学习笔记||fas fa-book:
    Hexo: /categories/Hexo/ || fas fa-feather
    前端: /categories/前端/ || fas fa-code
  工具箱||fas fa-toolbox||hide:
    导航: /nav/ || fas fa-compass
    资源: /resources/ || fas fa-box-open
  # 首页: / || fas fa-home
  # 列表||fas fa-list:
  #   音乐: /music/ || fas fa-music
  #   电影: /movies/ || fas fa-video

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: darker
  macStyle: true
  # 代码块高度限制（单位: px）
  height_limit: false
  word_wrap: false

  # 工具栏
  copy: true
  language: true
  # true: 收缩代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: false
  fullpage: false

# 社交媒体链接
# 格式:
#   图标: 链接 || 描述 || 颜色
social:
  fab fa-github: https://github.com/hunter007 || Github || '#24292e'
  fas fa-envelope: mailto:hunter007@gmail.com || 邮箱 || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: /img/头像.jpg
  effect: true

# 是否禁用所有顶部横幅图片
disable_top_img: false

# 如果页面未设置横幅图片，将使用默认的顶部图片
default_top_img: /img/背景.png

# 首页横幅图片
index_img: /img/背景.png

# 归档页横幅图片
archive_img:

# 注意: 是 tag page（单个标签页），不是 tags page（标签列表页）
tag_img:

# 标签页的横幅图片，你可以为每个标签设置不同的横幅图片
# 格式:
#  - 标签名: xxxxx
tag_per_img:

# 注意: 是 category page（单个分类页），不是 categories page（分类列表页）
category_img:

# 分类页的横幅图片，你可以为每个分类设置不同的横幅图片
# 格式:
#  - 分类名: xxxxx
category_per_img:

# 页脚背景图片
footer_img: false

# 网站背景
# 可以设置为颜色、图片 URL，或包含颜色和/或图片 URL 的数组
# 如果提供数组，每次加载时将从数组中随机选择一个背景
background: /img/背景.png

cover:
  # 是否禁用封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 未设置封面时，显示默认封面
  default_cover:
    # - xxx.jpg

# 替换损坏的图片
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 一个简单的 404 页面
error_404:
  enable: false
  subtitle: '页面未找到'
  background: /img/error-page.png

post_meta:
  # 首页
  page:
    # 可选: created / updated / both（创建时间 / 更新时间 / 两者都显示）
    date_type: created
    # 可选: date / relative（日期格式 / 相对时间格式）
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    # 可选: left / center（左对齐 / 居中）
    position: left
    # 可选: created / updated / both（创建时间 / 更新时间 / 两者都显示）
    date_type: both
    # 可选: date / relative（日期格式 / 相对时间格式）
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页顶部图片设置
# 默认: 顶部图片 - 全屏，站点信息 - 居中
# 站点信息的位置，例如: 300px/300em/300rem/10%
index_site_info_top:
# 顶部图片的高度，例如: 300px/300em/300rem
index_top_img_height: 36vh

# 首页副标题
subtitle:
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
    loop: true
    typeSpeed: 80
    backSpeed: 40
  # 来源 - 调用第三方服务 API（仅中文）
  # 将先显示来源，然后显示 sub 的内容
  # 可选: false/1/2/3
  # false - 禁用此功能
  # 1 - hitokoto.cn
  # 2 - https://api.aa1.cn/doc/yiyan.html
  # 3 - jinrishici.com
  source: false
  # 如果关闭打字机效果，副标题将只显示 sub 的第一行
  sub:
    - 记录每一次动手的过程
    - 把知识写成能复用的路径
    - Stay curious, keep building

# 首页文章布局
# 1: 封面在左侧，信息在右侧
# 2: 封面在右侧，信息在左侧
# 3: 封面与信息左右交替显示
# 4: 封面在上，信息在下
# 5: 信息显示在封面上
# 6: 瀑布流布局 - 封面在上，信息在下
# 7: 瀑布流布局 - 信息显示在封面上
index_layout: 3

# 首页是否显示文章摘要
# 1: description（文章描述）
# 2: both（如果 description 存在则显示，否则显示 auto_excerpt）
# 3: auto_excerpt（自动摘要，默认）
# false: 不显示文章摘要
index_post_content:
  method: 3
  # 如果设置 method 为 2 或 3，需要配置长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  # 仅用于文章
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞助/打赏
reward:
  enable: false
  text:
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: 微信
    # - img: /img/alipay.jpg
    #   link:
    #   text: 支付宝

# 文章编辑
# 可以方便地在线浏览和编辑博客源代码
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  enable: true
  # 显示文章的数量
  limit: 6
  # 可选: created / updated（按创建时间 / 更新时间）
  date_type: created

# 可选: 1 / 2 / false
# 1: 「下一篇」链接到较早的文章
# 2: 「下一篇」链接到较新的文章
# false: 禁用分页导航
post_pagination: 1

# 显示文章过时提醒
noticeOutdate:
  enable: false
  # 样式: simple / flat
  style: flat
  # 多少天后显示提醒
  limit_day: 365
  # 位置: top / bottom（顶部 / 底部）
  position: top
  message_prev: 距上次更新已有
  message_next: 天，文章内容可能已过时。

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  # 主题和框架的版权信息
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# 侧栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 在右下角按钮中显示隐藏侧栏的按钮
  button: true
  mobile: true
  # 位置: left / right（左 / 右）
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 记录学习，热爱技术，向着全栈和 AI Agent 方向努力。
    button:
      enable: true
      icon: fab fa-github
      text: 关注我
      link: https://github.com/hunter007
  card_announcement:
    enable: true
    content: 欢迎来到我的博客！这里记录了我的技术学习路线与思考，期待与你的交流。
  card_recent_post:
    enable: true
    # 设为 0 则显示全部
    limit: 5
    # 排序: date / updated（按日期 / 更新时间）
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 单位: 分钟，将数据保存到 localStorage
    storage: 10
    avatar: true
  card_categories:
    enable: true
    # 设为 0 则显示全部
    limit: 8
    # 可选: none / true / false
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 设为 0 则显示全部
    limit: 40
    color: false
    custom_colors:
    # 标签排序方式: random/name/length（随机/名称/长度）
    orderby: random
    # 排序顺序: 1 表示升序，-1 表示降序
    order: 1
    sort_order:
  card_archives:
    enable: true
    # 类型: monthly / yearly（按月 / 按年）
    type: monthly
    # 例如: YYYY年MM月
    format: MMMM YYYY
    # 排序顺序: 1 表示升序，-1 表示降序
    order: -1
    # 设为 0 则显示全部
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序顺序: 1 表示升序，-1 表示降序
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    # 发布日期与当前日期的时间差
    # 格式: 月/日/年 时间 或 年/月/日 时间
    # 如果不启用此功能请留空
    runtime_date: '07/13/2026 09:56:31'

# --------------------------------------
# 右下角按钮设置
# --------------------------------------

# 右下角按钮与底部的距离（默认单位: px）
rightside_bottom:

# 繁体中文与简体中文切换
translate:
  enable: false
  # 按钮文字
  default: 繁
  # 网站默认语言（1 - 繁体中文 / 2 - 简体中文）
  defaultEncoding: 2
  # 延迟时间
  translateDelay: 0
  # 当前为简体中文时按钮显示的文字
  msgToTraditionalChinese: '繁'
  # 当前为繁体中文时按钮显示的文字
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

# 暗色模式
darkmode:
  enable: true
  # 切换暗/亮模式的按钮
  button: true
  # 自动切换暗/亮模式
  # autoChangeMode: 1 跟随系统设置，如果系统不支持暗色模式，则在下午 6 点至上午 6 点之间切换为暗色模式
  # autoChangeMode: 2  在下午 6 点至上午 6 点之间切换为暗色模式
  # autoChangeMode: false（不自动切换）
  autoChangeMode: 1
  # 设置亮色模式的时间，取值范围 0-24，未设置则默认为 6 和 18
  start:
  end:

# 在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 除非你知道如何操作，否则不要修改以下设置
# 可选: readmode,translate,darkmode,hideAside,toc,chat,comment
# 不要重复相同的值
rightside_item_order:
  enable: false
  # 默认: readmode,translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# 右下角配置按钮的动画效果
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 滚动页面时，URL 将根据标题 id 更新
  auto_update: false
  # 点击标题时滚动并更新锚点
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  # 在复制内容后添加版权信息
  copyright:
    enable: false
    limit_count: 150

# 需要安装 hexo-wordcount 插件
wordcount:
  enable: true
  # 在文章 meta 中显示文章字数统计
  post_wordcount: true
  # 在文章 meta 中显示预计阅读时间
  min2read: true
  # 在侧栏网站信息中显示全站总字数统计
  total_wordcount: true

# 不蒜子网站统计 PV / UV
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学公式
# --------------------------------------

# 关于 per_page
# 如果设置为 true，将在每个页面加载 mathjax/katex 脚本
# 如果设置为 false，将根据你的设置加载 mathjax/katex 脚本（需要在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 可选: mathjax, katex
  # 如果你不需要数学公式请留空
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # 启用右键菜单
    enableMenu: true
    # 可选: all / ams / none，控制公式是否编号以及如何编号
    tags: none

  katex:
    # 启用复制 KaTeX 公式功能
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 可选: algolia_search / local_search / docsearch
  # 如果你不需要搜索请留空
  use: local_search
  placeholder:

  # Algolia 搜索
  algolia_search:
    # 每页显示的搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据
    preload: false
    # 每篇文章显示前 n 条结果，设为 -1 则显示全部结果
    top_n_per_article: 1
    # 将 HTML 字符串转换为可读格式
    unescape: false
    # 启用搜索结果分页
    pagination:
      enable: false
      # 每页显示的搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 可选: sharejs / addtoany
  # 如果你不需要分享请留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多可配置两个评论系统，第一个将作为默认显示
  # 如果你不需要评论请留空
  # 可选: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统的格式: Disqus,Waline
  use:
  # 在按钮旁显示评论系统名称
  text: true
  # 懒加载: 当评论元素进入浏览器可视区域时才加载评论系统
  # 如果设置为 true，评论计数将失效
  lazyload: false
  # 在文章顶部图片中显示评论数量
  count: false
  # 在首页显示评论数量
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  shortname:
  # 用于最新评论小部件
  apikey:

# 替代 Disqus - 使用 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere 来必力
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本会自动检测（无需手动填写）
  serverURLs:
  bg:
  # 使用 Valine 访客统计作为页面访问量
  visitor: false
  option:

# Waline - 一个简单的带后端支持的评论系统，从 Valine 衍生而来
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 使用 Waline 访问量统计作为页面访问量
  pageview: false
  option:

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

# Facebook 评论插件
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 可选: social / time / reverse_time（社交排序 / 时间排序 / 反向时间排序）
  order_by: social
  lang: en_US

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 使用 Twikoo 访客统计作为页面访问量
  visitor: false
  option:

# Giscus
# https://giscus.app/
giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 使用 Artalk 访客统计作为页面访问量
  visitor: false
  option:

# --------------------------------------
# 聊天服务
# --------------------------------------

chat:
  # 可选: chatra/tidio/crisp
  # 如果你不需要聊天请留空
  use:
  # 聊天按钮 [推荐]
  # 它将在网站右下角创建一个按钮，并隐藏原按钮
  rightside_button: false
  # 向上滚动时显示原聊天按钮，向下滚动时隐藏按钮
  button_hide_show: false

# https://chatra.io/
chatra:
  id:

# https://www.tidio.com/
tidio:
  public_key:

# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 分析统计
# --------------------------------------

# https://tongji.baidu.com/web/welcome/login
baidu_analytics:

# https://analytics.google.com/analytics/web/
google_analytics:

# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics:

# https://clarity.microsoft.com/
microsoft_clarity:

# https://umami.is/
umami_analytics:
  enable: false
  # 对于自托管部署，请配置 Umami 实例的主机名
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud（API 密钥）/ 自托管 Umami（token）
    token:

# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告
# --------------------------------------

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
# 如果你不需要广告请留空
ad:
  # 在首页插入广告（每三篇文章）
  index:
  # 在侧栏插入广告
  aside:
  # 在文章中插入广告（分页前）
  post:

# --------------------------------------
# 站点验证
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化 / 效果
# --------------------------------------

# 自定义主题颜色
# 注意: 颜色值必须使用双引号，例如 "#000"，否则可能报错！

theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "#ffffff"
  meta_theme_color_dark: "#0d0d0d"

# 分类页和标签页的用户界面设置
# 可选: index - 与首页 UI 相同 / default - 与归档页 UI 相同
# 留空或设为 index
category_ui:
tag_ui:

# UI 元素圆角
rounded_corners_ui: true

# 使每行文字宽度相等（两端对齐）
text_align_justify: false

# 为页眉和页脚添加遮罩
mask:
  header: false
  footer: true

# 加载动画
preloader:
  enable: true
  # 来源
  # 1. 全屏加载动画
  # 2. pace（进度条）
  source: 1
  # pace 主题（参见 https://codebyzach.github.io/pace/）
  pace_css_url:

# 页面切换过渡效果
enter_transitions: true

# 默认显示模式 - light（亮色，默认）/ dark（暗色）
display_mode: light

# 美化文章内容的配置
beautify:
  enable: false
  # 指定要美化的区域（site 全站或 post 文章）
  field: post
  # 指定用作标题前缀的图标，例如 '\f0c1'
  title_prefix_icon:
  # 指定标题前缀图标的颜色，例如 '#F47466'
  title_prefix_icon_color:

# 全局字体设置
# 除非你知道如何操作，否则不要修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分隔符图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  icon_top:

# 打字机效果
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 背景效果
# --------------------------------------

# canvas_ribbon 彩带效果
# 参见: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 彩带大小
  size: 150
  # 彩带透明度（0 ~ 1）
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 飘动彩带效果
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# canvas_nest 粒子连线效果
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: true
  # 线条颜色，默认: '0,0,0'；RGB 值: (R,G,B)（注意: 使用 ',' 分隔）
  color: '0,196,182'
  # 线条透明度（0~1）
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条数量
  count: 99
  mobile: false

# 鼠标点击效果: 烟花
fireworks:
  enable: true
  zIndex: 9999
  mobile: false

# 鼠标点击效果: 爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击效果: 文字
clickShowText:
  enable: false
  text:
    # - 我
    # - 爱
    # - 你
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 灯箱设置
# --------------------------------------

# 可选: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果你不需要灯箱请留空
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列文章
series:
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序顺序: 1 表示升序，-1 表示降序
  order: 1
  number: true

# ABCJS - ABC 音乐记谱插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid 流程图
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 使用代码块编写 Mermaid 图表
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default
    dark: dark
  # 启用「在新标签页中打开」按钮以在单独窗口中查看图表
  open_in_new_tab: true
  # 启用图表的缩放和平移交互
  zoom_pan: true

# chartjs 图表
# 参见 https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 除非你了解其工作原理，否则不要修改。
  # 默认设置仅在未指定 MD 语法时使用。
  # 图表的通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极坐标面积图刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - Bootstrap Callout（醒目提示标签）
note:
  # Note 标签样式可选值:
  #  - simple    旧式 bs-callout 提示样式，默认
  #  - modern    新式（v2-v3）bs-callout 提示样式
  #  - flat      带背景的扁平 callout 样式，类似于 Mozilla 或 StackOverflow
  #  - disabled  禁用 note 标签的所有 CSS 样式导入
  style: flat
  icons: true
  border_radius: 3
  # modern 和 flat 样式的背景亮度偏移百分比（modern: -12 或 12；flat: -18 或 6）。
  # 偏移量同样适用于 label 标签变量。此选项在禁用 note 标签时仍可使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# https://github.com/MoOx/pjax
pjax:
  enable: true
  # 从 pjax 中排除指定页面，例如 '/music/'
  exclude:
    # - /xxxxxx/

# 注入 css 和脚本（aplayer/meting）
aplayerInject:
  enable: true
  per_page: false

# Snackbar - Toast 通知
# https://github.com/polonel/SnackBar
# 位置: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: false
  position: bottom-left
  # 亮色模式和暗色模式下 Toast 通知的背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page
# https://instant.page/
instantpage: false

# 图片懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: false
  # 使用浏览器原生懒加载替代 vanilla-lazyload
  native: false
  # 指定启用懒加载的区域（site 全站或 post 文章）
  field: site
  placeholder:
  blur: false

# PWA
# 参见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# Open Graph 元标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 结构化数据
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 站点的替代名称，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加厂商前缀以确保兼容性
css_prefix: true

# 注入
# 将代码插入到 head（'</head>' 标签之前）和 bottom（'</body>' 标签之前）
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - |
      <script>
        var meting_api="https://api.i-meto.com/meting/api?server=:server&type=:type&id=:id&r=:r";
        document.addEventListener('DOMContentLoaded', () => {
          const observer = new MutationObserver(() => {
            const music = document.querySelector('.aplayer-music');
            if (music) {
              const titleEl = music.querySelector('.aplayer-title');
              const authorEl = music.querySelector('.aplayer-author');
              if (titleEl && authorEl) {
                const title = titleEl.innerText || '';
                const author = authorEl.innerText || '';
                const combined = `${title} - ${author}`;
                if (music.getAttribute('data-title-full') !== combined) {
                  music.setAttribute('data-title-full', combined);
                  titleEl.removeAttribute('title');
                  authorEl.removeAttribute('title');
                }
              }
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        });
      </script>
    - <div class="aplayer" data-id="2829816518" data-server="netease" data-type="playlist" data-fixed="true" data-autoplay="false" data-theme="#49B1F5" data-order="random" data-list-folded="true"></div>
    - <script src="https://fastly.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js"></script>

# CDN 设置
